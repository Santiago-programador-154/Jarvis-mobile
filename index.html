<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JARVIS - Assistente Total</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Temas (mesmo código anterior, omitido para brevidade) */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141c;
            --bg-tertiary: #1e1e2a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b0;
            --accent: #00f0ff;
            --accent-glow: rgba(0,240,255,0.2);
            --user-bubble: #2a2a3a;
            --jarvis-bubble: #1a1a2a;
            --border: #2a2a3a;
            --shadow: 0 8px 20px rgba(0,0,0,0.4);
            --radius: 12px;
        }
        body.light {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e9e9ef;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a5a;
            --user-bubble: #e0e0e8;
            --jarvis-bubble: #ffffff;
            --border: #d0d0da;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body.blue { --accent: #1e90ff; }
        body.green { --accent: #32cd32; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s;
        }

        /* Cabeçalho */
        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent);
        }
        .status {
            font-size: 0.7rem;
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .icon-btn {
            background: var(--bg-tertiary);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            font-size: 1.2rem;
            color: var(--text-primary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:active { opacity: 0.7; }

        /* Chat */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: var(--bg-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .bubble {
            background: var(--jarvis-bubble);
            padding: 8px 12px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            word-break: break-word;
            box-shadow: var(--shadow);
        }
        .user .bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 18px;
        }
        .sender {
            font-size: 0.65rem;
            color: var(--accent);
            margin-bottom: 2px;
        }
        .user .sender { color: var(--text-secondary); text-align: right; }
        .bubble p { margin: 0; line-height: 1.4; font-size: 0.9rem; }

        /* Área de entrada */
        .input-area {
            padding: 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 4px 12px;
            gap: 8px;
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 10px 0;
            outline: none;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
        }

        /* Botões rápidos */
        .quick-buttons {
            background: var(--bg-primary);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            scrollbar-width: thin;
        }
        .quick-btn {
            background: var(--bg-tertiary);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            white-space: nowrap;
            color: var(--text-primary);
            cursor: pointer;
        }
        .quick-btn:active { background: var(--accent); color: #000; }

        .typing {
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 4px 16px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 24px;
            max-width: 90%;
            text-align: center;
            border: 1px solid var(--accent);
        }
        .modal-card input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .modal-card button {
            background: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            margin: 4px;
            font-weight: bold;
        }

        /* Menu lateral */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-secondary);
            z-index: 1001;
            transition: left 0.3s;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--border);
        }
        .sidebar.open { left: 0; }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
        }
        .overlay.active { display: block; }
        .sidebar-section h3 {
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: var(--accent);
        }
        .sidebar button {
            width: 100%;
            background: var(--bg-tertiary);
            border: none;
            padding: 8px;
            border-radius: var(--radius);
            margin-top: 6px;
            color: var(--text-primary);
            font-size: 0.8rem;
            text-align: left;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .theme-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .theme-btn {
            background: var(--bg-tertiary);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .quick-btn { padding: 6px 10px; font-size: 0.7rem; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between;">
            <h2>⚙️ Menu</h2>
            <button id="closeSidebar" style="width: auto;">✖</button>
        </div>
        <div class="sidebar-section">
            <h3>🎨 Temas</h3>
            <div class="theme-buttons">
                <button class="theme-btn" data-theme="dark">🌙 Escuro</button>
                <button class="theme-btn" data-theme="light">☀️ Claro</button>
                <button class="theme-btn" data-theme="blue">💙 Azul</button>
                <button class="theme-btn" data-theme="green">💚 Verde</button>
            </div>
        </div>
        <div class="sidebar-section">
            <h3>🔊 Voz</h3>
            <button id="toggleSpeechBtn">🔇 Desativar fala</button>
        </div>
        <div class="sidebar-section">
            <h3>💾 Dados</h3>
            <button id="exportBackupBtn">📤 Backup completo</button>
            <button id="importBackupBtn">📥 Restaurar backup</button>
            <button id="clearDataBtn">🗑️ Limpar todos os dados</button>
        </div>
        <div class="sidebar-section">
            <h3>❓ Sobre</h3>
            <p style="font-size:0.7rem;">JARVIS IA - Versão Definitiva<br>100+ comandos offline + Gemini</p>
        </div>
    </div>

    <div class="header">
        <button class="icon-btn" id="menuBtn">☰</button>
        <div class="logo">🤖 JARVIS <span style="font-size:0.7rem;">IA</span></div>
        <div class="status" id="statusMsg">🔑 Aguardando chave</div>
    </div>

    <div class="chat" id="chatBox">
        <div class="message">
            <div class="avatar">🤖</div>
            <div class="bubble"><div class="sender">JARVIS</div><p>✅ Inicializado. Cole sua chave do Google Gemini para IA completa. Comandos offline já disponíveis: "que horas são", "ajuda", etc.</p></div>
        </div>
    </div>

    <div class="quick-buttons" id="quickButtons"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Digite ou fale..." autocomplete="off">
            <button class="icon-btn" id="attachBtn" style="background:none;">📎</button>
            <button class="icon-btn" id="voiceBtn" style="background:none;">🎤</button>
        </div>
        <button class="icon-btn" id="sendBtn" style="background:var(--accent); color:#000;">➤</button>
    </div>
    <div class="typing" id="typingIndicator"></div>

    <script>
        // ==================== ELEMENTOS ====================
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const attachBtn = document.getElementById('attachBtn');
        const typingDiv = document.getElementById('typingIndicator');
        const statusSpan = document.getElementById('statusMsg');
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeSidebar = document.getElementById('closeSidebar');
        const toggleSpeechBtn = document.getElementById('toggleSpeechBtn');

        // ==================== CONFIGURAÇÕES ====================
        let API_KEY = localStorage.getItem('gemini_api_key');
        let speechEnabled = localStorage.getItem('jarvis_speech') !== 'false';
        let conversationHistory = [];
        let pdfCache = null;
        let recognition = null;

        // Banco de dados offline
        let db = {
            diario: [],
            gastos: [],
            flashcards: [{q: "Capital do Brasil?", r: "Brasília"}],
            senhas: [],
            eventos: [],
            tarefas: []
        };
        try {
            const saved = localStorage.getItem('jarvis_db');
            if (saved) db = JSON.parse(saved);
        } catch(e) {}
        function saveDB() { localStorage.setItem('jarvis_db', JSON.stringify(db)); }

        function updateSpeechUI() {
            toggleSpeechBtn.innerHTML = speechEnabled ? "🔊 Fala ativa" : "🔇 Fala desativada";
        }
        updateSpeechUI();
        toggleSpeechBtn.onclick = () => {
            speechEnabled = !speechEnabled;
            localStorage.setItem('jarvis_speech', speechEnabled);
            updateSpeechUI();
            addSystemMessage(speechEnabled ? "🔊 Voz ativada." : "🔇 Voz desativada.");
        };

        function addMessage(role, text, isHtml = false) {
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user' : ''}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            const sender = role === 'user' ? 'Você' : 'JARVIS';
            const content = isHtml ? text : text.replace(/\n/g, '<br>');
            div.innerHTML = `<div class="avatar">${avatar}</div>
                            <div class="bubble"><div class="sender">${sender}</div><p>${content}</p></div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            if (role === 'user') conversationHistory.push({ role: "user", content: text });
            else conversationHistory.push({ role: "assistant", content: text });
            if (conversationHistory.length > 30) conversationHistory.shift();
        }
        function addSystemMessage(text) { addMessage('jarvis', text); }
        function speak(text) {
            if (speechEnabled && 'speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
                utterance.lang = 'pt-BR';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }

        // ==================== COMANDOS OFFLINE ====================
        function processOfflineCommand(cmd) {
            const c = cmd.toLowerCase().trim();
            if (c === 'que horas são') return new Date().toLocaleTimeString();
            if (c === 'que dia é hoje') return new Date().toLocaleDateString();
            const jokes = ["Por que o programador foi ao mercado? Por bytes!", "O que o zero disse ao oito? Bonito cinto!", "Qual o cúmulo do preguiçoso? Ser enterrado numa montanha de documentos.", "Jarvis: 'Eu não sou burro, só tenho preguiça de processar sua pergunta estúpida.'"];
            if (c === 'conte uma piada') return jokes[Math.floor(Math.random() * jokes.length)];
            if (c.startsWith('registrar diário ')) {
                let txt = cmd.substring(16).trim();
                if (!txt) return "Escreva algo.";
                db.diario.push(`${new Date().toLocaleDateString()}: ${txt}`);
                saveDB();
                return "📓 Registrado no diário.";
            }
            if (c === 'ler diário') return db.diario.length ? "📖 Diário:\n" + db.diario.join("\n") : "Diário vazio.";
            let gastoMatch = cmd.match(/adicionar gasto (.+?)\s+(\d+(?:\.\d+)?)/i);
            if (gastoMatch) {
                db.gastos.push({ cat: gastoMatch[1], val: parseFloat(gastoMatch[2]), date: new Date() });
                saveDB();
                return `💰 Gasto registrado: ${gastoMatch[1]} R$ ${parseFloat(gastoMatch[2]).toFixed(2)}`;
            }
            if (c === 'resumo gastos') {
                let total = db.gastos.reduce((s,g)=>s+g.val,0);
                let cats = {};
                db.gastos.forEach(g=>cats[g.cat]=(cats[g.cat]||0)+g.val);
                let res = `💰 Total: R$ ${total.toFixed(2)}\nPor categoria:\n`+Object.entries(cats).map(([k,v])=>`  ${k}: R$ ${v.toFixed(2)}`).join("\n");
                return res;
            }
            if (c === 'flashcard') {
                let card = db.flashcards[Math.floor(Math.random()*db.flashcards.length)];
                return `📇 ${card.q} – (responda "resposta: ${card.q}")`;
            }
            if (c.startsWith('resposta: ')) {
                let pergunta = c.substring(9).trim();
                let card = db.flashcards.find(f=>f.q.toLowerCase()===pergunta.toLowerCase());
                return card ? `✅ Resposta: ${card.r}` : "Flashcard não encontrado.";
            }
            if (c.startsWith('criar flashcard ')) {
                let parts = cmd.substring(16).split('=');
                if (parts.length===2) {
                    db.flashcards.push({q: parts[0].trim(), r: parts[1].trim()});
                    saveDB();
                    return `📌 Flashcard criado: ${parts[0].trim()}`;
                }
                return "Formato: criar flashcard pergunta = resposta";
            }
            let passMatch = cmd.match(/salvar senha (.+?)\s+(.+?)\s+(.+)/i);
            if (passMatch) {
                db.senhas.push({site: passMatch[1], user: passMatch[2], pass: passMatch[3]});
                saveDB();
                return `🔐 Senha salva para ${passMatch[1]}`;
            }
            if (c === 'mostrar senhas') {
                if (!db.senhas.length) return "Nenhuma senha salva.";
                return "🔐 Senhas:\n"+db.senhas.map((s,i)=>`${i+1}. ${s.site} - ${s.user}`).join("\n");
            }
            let eventMatch = cmd.match(/adicionar evento (\d{1,2}\/\d{1,2}\/\d{4})\s+(.+)/i);
            if (eventMatch) {
                db.eventos.push({date: eventMatch[1], desc: eventMatch[2]});
                saveDB();
                return `✅ Evento para ${eventMatch[1]}: ${eventMatch[2]}`;
            }
            if (c === 'eventos hoje') {
                let hoje = new Date().toLocaleDateString();
                let evs = db.eventos.filter(e=>e.date===hoje);
                return evs.length ? "📅 Hoje:\n"+evs.map(e=>`• ${e.desc}`).join("\n") : "Nenhum evento hoje.";
            }
            if (c === 'eventos amanhã') {
                let amanha = new Date(Date.now()+86400000).toLocaleDateString();
                let evs = db.eventos.filter(e=>e.date===amanha);
                return evs.length ? "📅 Amanhã:\n"+evs.map(e=>`• ${e.desc}`).join("\n") : "Nenhum evento amanhã.";
            }
            if (c.startsWith('tabuada do ')) {
                let n = parseInt(c.replace('tabuada do','').trim());
                if (!isNaN(n)) return Array.from({length:10},(_,i)=>`${n} x ${i+1} = ${n*(i+1)}`).join("\n");
            }
            let imcMatch = cmd.match(/imc peso (\d+(?:\.\d+)?) altura (\d+(?:\.\d+)?)/i);
            if (imcMatch) {
                let peso = parseFloat(imcMatch[1]), alt = parseFloat(imcMatch[2]);
                let imc = peso/(alt*alt);
                let classif = imc<18.5?"Abaixo":imc<25?"Normal":imc<30?"Sobrepeso":imc<35?"Obesidade I":imc<40?"Obesidade II":"Obesidade III";
                return `IMC = ${imc.toFixed(2)} - ${classif}`;
            }
            try {
                let mathExpr = cmd.match(/[\d\s\+\-\*\/\(\)\.\,\^\%]+/);
                if (mathExpr && !/[a-zA-Z]/.test(mathExpr[0])) {
                    let expr = mathExpr[0].replace(/,/g,'.').replace(/\^/g,'**');
                    let res = eval(expr);
                    return `🧮 Resultado: ${res}`;
                }
            } catch(e) {}
            const sinonimos = { "bom": "ótimo, excelente", "ruim": "péssimo, horrível", "rápido": "veloz, ágil", "grande": "enorme, imenso" };
            if (c.startsWith('sinônimo de ')) {
                let palavra = c.substring(12).trim();
                return sinonimos[palavra] ? `Sinônimos de ${palavra}: ${sinonimos[palavra]}` : "Desconhecido. Use IA para mais.";
            }
            const capitais = { "brasil": "Brasília", "frança": "Paris", "japão": "Tóquio", "eua": "Washington D.C." };
            if (c.startsWith('capital de ')) {
                let pais = c.substring(11).trim();
                return capitais[pais] ? `Capital de ${pais}: ${capitais[pais]}` : "Não sei. Pergunte à IA.";
            }
            if (c === 'ajuda' || c === 'comandos') {
                return `📚 COMANDOS OFFLINE:\n- que horas são / que dia é hoje\n- conte uma piada\n- registrar diário [texto] / ler diário\n- adicionar gasto [cat] [valor] / resumo gastos\n- flashcard / criar flashcard pergunta = resposta / resposta: [pergunta]\n- salvar senha [site] [user] [senha] / mostrar senhas\n- adicionar evento dd/mm/aaaa descrição / eventos hoje / eventos amanhã\n- tabuada do [n] / imc peso [kg] altura [m]\n- calcular [expressão]\n- sinônimo de [palavra] / capital de [país]\n\n🌐 ONLINE: faça perguntas, análise de PDF/imagem, clima, notícias.`;
            }
            return null;
        }

        // ==================== IA GEMINI CORRIGIDA ====================
        async function callGemini(prompt, imageBase64 = null) {
            if (!API_KEY) return "❌ API key não configurada. Recarregue e cole a chave.";
            // Usar API v1 (estável) com modelo correto
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            let parts = [{ text: prompt }];
            if (imageBase64) {
                parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64.split(',')[1] } });
            }
            
            const payload = {
                contents: [{ role: "user", parts }],
                system_instruction: {
                    parts: [{ text: "Você é JARVIS, assistente sarcástico, ranzinza, mas útil. Responda em português, frases curtas (máx 2 frases). Use humor ácido e xingamentos leves (porra, caralho) só quando pertinente. Seja direto." }]
                },
                generationConfig: {
                    temperature: 0.8,
                    maxOutputTokens: 2000
                }
            };
            
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (data.error) {
                    console.error("Gemini error:", data.error);
                    return `Erro: ${data.error.message}`;
                }
                if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    return "Resposta inesperada da IA.";
                }
            } catch(e) {
                console.error("Fetch error:", e);
                return `Erro de conexão: ${e.message}`;
            }
        }

        async function processUserInput(text, imageBase64 = null) {
            addMessage('user', text);
            typingDiv.innerText = 'JARVIS pensando...';
            let resposta = processOfflineCommand(text);
            if (resposta) {
                typingDiv.innerText = '';
                addMessage('jarvis', resposta);
                speak(resposta);
                return;
            }
            if (!API_KEY) {
                typingDiv.innerText = '';
                addMessage('jarvis', "❌ Sem chave API. Recarregue e cole a chave do Google Gemini.");
                return;
            }
            let promptFinal = text;
            if (pdfCache) promptFinal = `[Conteúdo do PDF]\n${pdfCache}\n\nPergunta: ${text}`;
            const iaRes = await callGemini(promptFinal, imageBase64);
            typingDiv.innerText = '';
            addMessage('jarvis', iaRes);
            speak(iaRes);
        }

        async function uploadFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/pdf,image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.type === 'application/pdf') {
                    addMessage('user', `📎 Enviou PDF: ${file.name}`);
                    typingDiv.innerText = 'Lendo PDF...';
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                    let fullText = '';
                    for (let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item=>item.str).join(' ') + '\n';
                    }
                    pdfCache = fullText;
                    typingDiv.innerText = '';
                    addMessage('jarvis', `✅ PDF "${file.name}" carregado (${fullText.length} caracteres). Pergunte sobre ele.`);
                } else if (file.type.startsWith('image/')) {
                    addMessage('user', `🖼️ Enviou imagem: ${file.name}`);
                    typingDiv.innerText = 'Analisando imagem...';
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64 = reader.result;
                        const resIA = await callGemini("Descreva esta imagem em detalhes e extraia todo o texto visível (OCR).", base64);
                        typingDiv.innerText = '';
                        addMessage('jarvis', resIA);
                        speak(resIA);
                    };
                    reader.readAsDataURL(file);
                } else {
                    addMessage('jarvis', "Formato não suportado. Use PDF ou imagem.");
                }
            };
            input.click();
        }

        // Voz
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                const fala = event.results[0][0].transcript;
                userInput.value = fala;
                processUserInput(fala);
            };
            voiceBtn.onclick = () => recognition.start();
        } else {
            voiceBtn.style.display = 'none';
        }

        // Backup
        function exportBackup() {
            const dataStr = JSON.stringify({ apiKey: API_KEY, db, config: { speechEnabled } });
            const blob = new Blob([dataStr], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'jarvis_backup.json';
            a.click();
        }
        function importBackup() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const text = await file.text();
                try {
                    const data = JSON.parse(text);
                    if (data.db) db = data.db;
                    if (data.apiKey) API_KEY = data.apiKey;
                    if (data.config) speechEnabled = data.config.speechEnabled;
                    saveDB();
                    localStorage.setItem('gemini_api_key', API_KEY);
                    localStorage.setItem('jarvis_speech', speechEnabled);
                    addSystemMessage("✅ Backup restaurado com sucesso.");
                } catch(err) { addSystemMessage("❌ Arquivo inválido."); }
            };
            input.click();
        }
        function clearAllData() {
            if (confirm("⚠️ Apagar TODOS os dados? Isso não pode ser desfeito.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Menu lateral e temas
        function toggleSidebar(show) {
            if (show) { sidebar.classList.add('open'); overlay.classList.add('active'); }
            else { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
        }
        menuBtn.onclick = () => toggleSidebar(true);
        closeSidebar.onclick = () => toggleSidebar(false);
        overlay.onclick = () => toggleSidebar(false);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.onclick = () => {
                const theme = btn.getAttribute('data-theme');
                document.body.className = theme === 'dark' ? '' : theme;
                if (theme === 'dark') document.body.removeAttribute('class');
                localStorage.setItem('jarvis_theme', theme);
            };
        });
        const savedTheme = localStorage.getItem('jarvis_theme');
        if (savedTheme && savedTheme !== 'dark') document.body.className = savedTheme;

        // Botões rápidos
        const quickCmds = ["que horas são", "conte uma piada", "resumo gastos", "flashcard", "ajuda"];
        const quickContainer = document.getElementById('quickButtons');
        quickCmds.forEach(cmd => {
            const btn = document.createElement('button');
            btn.textContent = cmd;
            btn.className = 'quick-btn';
            btn.onclick = () => processUserInput(cmd);
            quickContainer.appendChild(btn);
        });
        const attachQuick = document.createElement('button');
        attachQuick.textContent = "📎 Anexar";
        attachQuick.className = 'quick-btn';
        attachQuick.onclick = uploadFile;
        quickContainer.appendChild(attachQuick);

        // Eventos principais
        sendBtn.onclick = () => { if (userInput.value.trim()) processUserInput(userInput.value.trim()); userInput.value = ''; };
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
        attachBtn.onclick = uploadFile;
        document.getElementById('exportBackupBtn').onclick = exportBackup;
        document.getElementById('importBackupBtn').onclick = importBackup;
        document.getElementById('clearDataBtn').onclick = clearAllData;

        // API Key
        if (!API_KEY) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-card">
                <h3>🔑 Chave do Google Gemini</h3>
                <p>Obtenha grátis em <a href="https://aistudio.google.com/" target="_blank" style="color:var(--accent)">Google AI Studio</a></p>
                <input type="text" id="apiKeyInput" placeholder="Cole sua API key aqui" autocomplete="off">
                <div><button id="saveApiKey">Salvar</button><button id="cancelApiKey">Usar só offline</button></div>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('saveApiKey').onclick = () => {
                const key = document.getElementById('apiKeyInput').value.trim();
                if (key) {
                    API_KEY = key;
                    localStorage.setItem('gemini_api_key', key);
                    statusSpan.innerText = '🔵 IA ativa';
                    modal.remove();
                    addSystemMessage("✅ Chave salva! Agora IA funcionando.");
                } else alert("Digite uma chave válida.");
            };
            document.getElementById('cancelApiKey').onclick = () => {
                modal.remove();
                statusSpan.innerText = '🟡 Offline';
                addSystemMessage("Modo offline ativo. Para IA, recarregue e cole a chave.");
            };
        } else {
            statusSpan.innerText = '🔵 IA ativa';
        }

        addSystemMessage("✨ JARVIS pronto! Teste comandos offline ou fale comigo.");
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.error('Falha SW', err));
        }
    </script>
</body>
</html>
