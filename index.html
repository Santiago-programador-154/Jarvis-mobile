<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JARVIS - Conhecimento Total (Programação + Finanças + Humanidades)</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* ESTILOS (mesmo da versão Ultra) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #14141c; --bg-tertiary: #1e1e2a;
            --text-primary: #f0f0f0; --text-secondary: #a0a0b0;
            --accent: #00f0ff; --user-bubble: #2a2a3a; --jarvis-bubble: #1a1a2a;
            --border: #2a2a3a; --shadow: 0 8px 20px rgba(0,0,0,0.4); --radius: 12px;
        }
        body.light { --bg-primary: #f5f5f7; --bg-secondary: #ffffff; --bg-tertiary: #e9e9ef; --text-primary: #1a1a2e; --text-secondary: #4a4a5a; --user-bubble: #e0e0e8; --jarvis-bubble: #ffffff; --border: #d0d0da; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        body.blue { --accent: #1e90ff; } body.green { --accent: #32cd32; }
        body { font-family: system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--bg-secondary); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        .status { font-size: 0.7rem; background: var(--bg-tertiary); padding: 4px 10px; border-radius: 20px; }
        .icon-btn { background: var(--bg-tertiary); border: none; width: 38px; height: 38px; border-radius: 30px; font-size: 1.2rem; color: var(--text-primary); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .icon-btn:active { opacity: 0.7; }
        .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; gap: 8px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; background: var(--bg-tertiary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .bubble { background: var(--jarvis-bubble); padding: 8px 12px; border-radius: 18px; border-bottom-left-radius: 4px; word-break: break-word; box-shadow: var(--shadow); }
        .user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; border-bottom-left-radius: 18px; }
        .sender { font-size: 0.65rem; color: var(--accent); margin-bottom: 2px; }
        .user .sender { color: var(--text-secondary); text-align: right; }
        .bubble p { margin: 0; line-height: 1.4; font-size: 0.9rem; }
        .input-area { padding: 12px; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
        .input-wrapper { flex: 1; background: var(--bg-tertiary); border-radius: 30px; display: flex; align-items: center; padding: 4px 12px; gap: 8px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 1rem; padding: 10px 0; outline: none; }
        .action-buttons { display: flex; gap: 6px; }
        .quick-buttons { background: var(--bg-primary); padding: 8px 12px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; border-top: 1px solid var(--border); scrollbar-width: thin; }
        .quick-btn { background: var(--bg-tertiary); border: none; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; white-space: nowrap; color: var(--text-primary); cursor: pointer; }
        .quick-btn:active { background: var(--accent); color: #000; }
        .typing { font-size: 0.7rem; color: var(--text-secondary); padding: 4px 16px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: var(--bg-secondary); padding: 24px; border-radius: 24px; max-width: 90%; text-align: center; border: 1px solid var(--accent); }
        .modal-card input { width: 100%; padding: 10px; margin: 15px 0; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 30px; font-size: 0.9rem; }
        .modal-card button { background: var(--accent); border: none; padding: 8px 20px; border-radius: 30px; margin: 4px; font-weight: bold; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--bg-secondary); z-index: 1001; transition: left 0.3s; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid var(--border); }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .overlay.active { display: block; }
        .sidebar-section h3 { font-size: 0.8rem; margin-bottom: 8px; color: var(--accent); }
        .sidebar button { width: 100%; background: var(--bg-tertiary); border: none; padding: 8px; border-radius: var(--radius); margin-top: 6px; color: var(--text-primary); font-size: 0.8rem; text-align: left; display: flex; gap: 8px; align-items: center; }
        .theme-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .theme-btn { background: var(--bg-tertiary); border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; }
        @media (max-width: 600px) { .message { max-width: 95%; } .quick-btn { padding: 6px 10px; font-size: 0.7rem; } }
        .pdf-controls { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .pdf-controls button { background: var(--bg-tertiary); border: none; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between;"><h2>⚙️ Menu</h2><button id="closeSidebar" style="width: auto;">✖</button></div>
        <div class="sidebar-section"><h3>🎨 Temas</h3><div class="theme-buttons"><button class="theme-btn" data-theme="dark">🌙 Escuro</button><button class="theme-btn" data-theme="light">☀️ Claro</button><button class="theme-btn" data-theme="blue">💙 Azul</button><button class="theme-btn" data-theme="green">💚 Verde</button></div></div>
        <div class="sidebar-section"><h3>🔊 Voz</h3><button id="toggleSpeechBtn">🔇 Desativar fala</button></div>
        <div class="sidebar-section"><h3>💾 Dados</h3><button id="exportBackupBtn">📤 Backup completo</button><button id="importBackupBtn">📥 Restaurar backup</button><button id="clearDataBtn">🗑️ Limpar todos os dados</button></div>
        <div class="sidebar-section"><h3>❓ Sobre</h3><p style="font-size:0.7rem;">JARVIS Programação+Finanças+Humanidades<br>Offline total</p></div>
    </div>
    <div class="header"><button class="icon-btn" id="menuBtn">☰</button><div class="logo">🤖 JARVIS <span style="font-size:0.7rem;">Dev+Fin</span></div><div class="status" id="statusMsg">🟢 100% offline</div></div>
    <div class="chat" id="chatBox"><div class="message"><div class="avatar">🤖</div><div class="bubble"><div class="sender">JARVIS</div><p>✅ Conhecimento total: Python, Java, JavaScript, HTML, CSS, SQL, TypeScript, Finanças, Humanidades, Exatas. Digite 'ajuda' para ver todos os comandos.</p></div></div></div>
    <div class="quick-buttons" id="quickButtons"></div>
    <div class="input-area"><div class="input-wrapper"><input type="text" id="userInput" placeholder="Digite ou fale..." autocomplete="off"><button class="icon-btn" id="attachBtn" style="background:none;">📎</button><button class="icon-btn" id="voiceBtn" style="background:none;">🎤</button><button class="icon-btn" id="qrScanBtn" style="background:none;">📷</button></div><button class="icon-btn" id="sendBtn" style="background:var(--accent); color:#000;">➤</button></div>
    <div class="typing" id="typingIndicator"></div>
    <script>
        // ==================== ELEMENTOS DOM ====================
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const attachBtn = document.getElementById('attachBtn');
        const qrScanBtn = document.getElementById('qrScanBtn');
        const typingDiv = document.getElementById('typingIndicator');
        const statusSpan = document.getElementById('statusMsg');
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeSidebar = document.getElementById('closeSidebar');
        const toggleSpeechBtn = document.getElementById('toggleSpeechBtn');

        // ==================== CONFIGURAÇÕES ====================
        let speechEnabled = localStorage.getItem('jarvis_speech') !== 'false';
        let recognition = null;
        let speechRate = 0.9;
        let modoNaoPerturbe = false;
        let timerId = null;
        let cronometroInterval = null;
        let cronometroSegundos = 0;

        // ==================== KNOWLEDGE BASE ====================
        let knowledgeBase = JSON.parse(localStorage.getItem('jarvis_knowledge')) || {
            "python": ["Python: alto nível, interpretada, tipagem dinâmica, indentação obrigatória.", "Variáveis: nome = 'João'", "Estruturas: lista, tupla, dicionário, conjunto", "Funções: def somar(a,b): return a+b", "OO: class Pessoa: def __init__(self,nome): self.nome=nome"],
            "java": ["Java: compilado para bytecode, JVM, fortemente tipado.", "Classe: public class HelloWorld { public static void main... }", "Herança: extends, interface: implements"],
            "javascript": ["JS: interpretado, tipagem dinâmica, base do front-end.", "Variáveis: let, const", "Funções arrow: const soma = (a,b)=> a+b", "DOM: document.getElementById"],
            "html": ["HTML: estrutura de páginas.", "Tags: <div>, <p>, <a>, <img>, <form>, <table>"],
            "css": ["CSS: estilos. Seletores, box model, flexbox, grid, animações."],
            "sql": ["SQL: SELECT, INSERT, UPDATE, DELETE, JOIN, GROUP BY, subconsultas."],
            "typescript": ["TypeScript: tipagem estática, interfaces, generics, compila para JS."],
            "matematica financeira": ["Juros simples: J=C·i·t", "Juros compostos: M=C(1+i)^t", "VPL = Σ FC/(1+i)^t - Investimento", "SAC e Price"],
            "contabilidade": ["Ativo = Passivo + PL", "DRE, Liquidez corrente = AC/PC", "ROE = Lucro Líquido/PL"],
            "historia": ["Independência do Brasil (1822)", "Revolução Francesa (1789)", "1ª Guerra (1914-1918)", "2ª Guerra (1939-1945)", "Guerra Fria"],
            "geografia": ["Globalização, blocos econômicos, demografia: densidade = Pop/Área, TN = (nascidos/pop)×1000"],
            "fisica": ["Velocidade média = Δs/Δt", "Força = m·a", "Lei de Ohm: V=R·i", "Potência: P=U·i"],
            "quimica": ["Água H2O, Sal NaCl", "Radioatividade: meia-vida N = N₀·(1/2)^{t/t₁/₂}"],
            "biologia": ["Célula, fotossíntese, respiração, DNA, evolução."],
            "ingles": ["Hello = Olá", "Good morning = Bom dia", "Thank you = Obrigado", "Present Perfect, Passive Voice"],
            "diario": [], "notas": [], "flashcards": [{q:"Capital do Brasil?", r:"Brasília"}], "tarefas": []
        };
        function saveKnowledgeBase() { localStorage.setItem('jarvis_knowledge', JSON.stringify(knowledgeBase)); }

        // ==================== OUTROS BANCOS ====================
        let gastos = JSON.parse(localStorage.getItem('jarvis_gastos')) || [];
        let eventos = JSON.parse(localStorage.getItem('jarvis_eventos')) || [];
        let senhas = JSON.parse(localStorage.getItem('jarvis_senhas')) || [];
        let carteiraInvestimentos = JSON.parse(localStorage.getItem('jarvis_carteira')) || [];
        let orcamentoMensal = JSON.parse(localStorage.getItem('jarvis_orcamento')) || { limite: 0 };
        let metaEconomia = JSON.parse(localStorage.getItem('jarvis_meta')) || { objetivo: 0, atual: 0 };
        let historicoConversas = [];

        function saveAll() {
            localStorage.setItem('jarvis_knowledge', JSON.stringify(knowledgeBase));
            localStorage.setItem('jarvis_gastos', JSON.stringify(gastos));
            localStorage.setItem('jarvis_eventos', JSON.stringify(eventos));
            localStorage.setItem('jarvis_senhas', JSON.stringify(senhas));
            localStorage.setItem('jarvis_carteira', JSON.stringify(carteiraInvestimentos));
            localStorage.setItem('jarvis_orcamento', JSON.stringify(orcamentoMensal));
            localStorage.setItem('jarvis_meta', JSON.stringify(metaEconomia));
        }

        // ==================== UI E VOZ ====================
        function updateSpeechUI() { toggleSpeechBtn.innerHTML = speechEnabled ? "🔊 Fala ativa" : "🔇 Fala desativada"; }
        updateSpeechUI();
        toggleSpeechBtn.onclick = () => { speechEnabled = !speechEnabled; localStorage.setItem('jarvis_speech', speechEnabled); updateSpeechUI(); addSystemMessage(speechEnabled ? "🔊 Voz ativada." : "🔇 Voz desativada."); };

        function addMessage(role, text, isHtml = false) {
            const div = document.createElement('div'); div.className = `message ${role === 'user' ? 'user' : ''}`;
            const avatar = role === 'user' ? '👤' : '🤖'; const sender = role === 'user' ? 'Você' : 'JARVIS';
            const content = isHtml ? text : text.replace(/\n/g, '<br>');
            div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble"><div class="sender">${sender}</div><p>${content}</p></div>`;
            chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
            if (role === 'user') historicoConversas.push({ role: 'user', text, timestamp: new Date() });
            else historicoConversas.push({ role: 'jarvis', text, timestamp: new Date() });
        }
        function addSystemMessage(text, isHtml = false) { addMessage('jarvis', text, isHtml); }
        function speak(text) { if (speechEnabled && !modoNaoPerturbe && window.speechSynthesis) { window.speechSynthesis.cancel(); const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'pt-BR'; utterance.rate = speechRate; window.speechSynthesis.speak(utterance); } }

        // ==================== PDF E LEITURA ====================
        let pdfBlocos = [], blocoAtual = 0, leituraAtiva = false, leituraPausada = false;
        function dividirTextoEmBlocos(texto, tamBloco = 550) {
            let palavras = texto.split(/\s+/); let blocos = []; let atual = '';
            for (let p of palavras) {
                if ((atual + ' ' + p).length > tamBloco) { if (atual) blocos.push(atual.trim()); atual = p; }
                else atual += (atual ? ' ' : '') + p;
            }
            if (atual) blocos.push(atual.trim()); return blocos;
        }
        function lerBloco(indice) {
            if (!leituraAtiva || leituraPausada) return;
            if (indice >= pdfBlocos.length) { addSystemMessage("📖 Fim do PDF."); leituraAtiva = false; return; }
            blocoAtual = indice;
            addSystemMessage(`🔊 Lendo bloco ${indice+1}/${pdfBlocos.length}`, false);
            if (!speechEnabled) { addSystemMessage(`[Bloco ${indice+1}] ${pdfBlocos[indice]}`); setTimeout(() => lerBloco(indice+1), 500); return; }
            const utterance = new SpeechSynthesisUtterance(pdfBlocos[indice]); utterance.lang = 'pt-BR'; utterance.rate = speechRate;
            utterance.onend = () => { if (leituraAtiva && !leituraPausada) lerBloco(indice+1); };
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance);
        }
        function iniciarLeituraBlocos() { if (!pdfBlocos.length) { addSystemMessage("Nenhum PDF carregado."); return; } if (leituraAtiva && !leituraPausada) { addSystemMessage("Leitura já em andamento."); return; } if (leituraPausada) { leituraPausada = false; leituraAtiva = true; lerBloco(blocoAtual); return; } if (blocoAtual >= pdfBlocos.length) blocoAtual = 0; leituraAtiva = true; leituraPausada = false; lerBloco(blocoAtual); }
        function pausarLeitura() { if (leituraAtiva && !leituraPausada) { window.speechSynthesis.cancel(); leituraPausada = true; addSystemMessage("⏸️ Pausado."); } else addSystemMessage("Nenhuma leitura ativa."); }
        function continuarLeitura() { if (leituraPausada && pdfBlocos.length) { leituraPausada = false; leituraAtiva = true; lerBloco(blocoAtual); } else if (!leituraAtiva && pdfBlocos.length) iniciarLeituraBlocos(); else addSystemMessage("Nada para continuar."); }
        function proximoBloco() { if (!pdfBlocos.length) return; if (leituraAtiva) pausarLeitura(); if (blocoAtual+1 < pdfBlocos.length) { blocoAtual++; addSystemMessage(`⏩ Bloco ${blocoAtual+1}/${pdfBlocos.length}`); } else addSystemMessage("Último bloco."); }
        function anteriorBloco() { if (!pdfBlocos.length) return; if (leituraAtiva) pausarLeitura(); if (blocoAtual > 0) { blocoAtual--; addSystemMessage(`⏪ Bloco ${blocoAtual+1}/${pdfBlocos.length}`); } else addSystemMessage("Primeiro bloco."); }
        window.iniciarLeituraBlocos = iniciarLeituraBlocos; window.pausarLeitura = pausarLeitura; window.continuarLeitura = continuarLeitura; window.proximoBloco = proximoBloco; window.anteriorBloco = anteriorBloco;

        // ==================== UPLOAD PDF/IMAGEM ====================
        async function uploadFile() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/pdf,image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                if (file.type === 'application/pdf') {
                    addMessage('user', `📎 Enviou PDF: ${file.name}`);
                    typingDiv.innerText = 'Processando PDF...';
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                    let fullText = '';
                    for (let i=1; i<=pdf.numPages; i++) { const page = await pdf.getPage(i); const content = await page.getTextContent(); fullText += content.items.map(item=>item.str).join(' ') + '\n'; }
                    pdfBlocos = dividirTextoEmBlocos(fullText, 550);
                    blocoAtual = 0;
                    typingDiv.innerText = '';
                    const controlsHtml = `<div class="pdf-controls"><button onclick="window.iniciarLeituraBlocos()">🔊 Ler</button><button onclick="window.pausarLeitura()">⏸️ Pausar</button><button onclick="window.continuarLeitura()">▶️ Cont.</button><button onclick="window.proximoBloco()">⏩ Próx</button><button onclick="window.anteriorBloco()">⏪ Ant</button></div>`;
                    addSystemMessage(`✅ PDF "${file.name}" (${pdf.numPages} págs, ${pdfBlocos.length} blocos). ${controlsHtml}`, true);
                } else if (file.type.startsWith('image/')) {
                    addMessage('user', `🖼️ Enviou imagem: ${file.name}`);
                    typingDiv.innerText = 'OCR...';
                    try { const { data: { text } } = await Tesseract.recognize(file, 'por'); typingDiv.innerText = ''; addSystemMessage(`📷 Texto extraído:\n${text || "Nenhum texto encontrado."}`); speak("OCR concluído."); } catch(err) { typingDiv.innerText = ''; addSystemMessage(`❌ OCR falhou: ${err.message}`); }
                } else addSystemMessage("Formato não suportado.");
            }; input.click();
        }
        attachBtn.onclick = uploadFile;

        // ==================== QR CODE SCAN ====================
        async function scanQRCode() {
            const video = document.createElement('video'); const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-card"><h3>📱 Aponte para o QR Code</h3><video id="qrVideo" autoplay playsinline></video><br><button id="closeQRModal">Fechar</button></div>`;
            document.body.appendChild(modal);
            const videoElement = modal.querySelector('#qrVideo');
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElement.srcObject = stream; await videoElement.play();
                const tick = () => {
                    if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                        canvas.width = videoElement.videoWidth; canvas.height = videoElement.videoHeight;
                        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                        let code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
                        if (code) { if (stream) stream.getTracks().forEach(t=>t.stop()); modal.remove(); addSystemMessage(`📲 QR Code: ${code.data}`); speak("QR Code lido."); return; }
                    } requestAnimationFrame(tick);
                }; tick();
                modal.querySelector('#closeQRModal').onclick = () => { if (stream) stream.getTracks().forEach(t=>t.stop()); modal.remove(); };
            } catch(err) { modal.innerHTML = `<div class="modal-card"><p>❌ Erro câmera: ${err.message}</p><button id="closeQRModal">Fechar</button></div>`; modal.querySelector('#closeQRModal').onclick = () => modal.remove(); }
        }
        qrScanBtn.onclick = scanQRCode;

        // ==================== COMANDOS OFFLINE (COM AJUDA EXPANDIDA) ====================
        function processOfflineCommand(cmd) {
            const c = cmd.toLowerCase().trim();
            // Verifica matérias
            for (let materia in knowledgeBase) {
                if (c === materia && knowledgeBase[materia] && knowledgeBase[materia].length) {
                    return `<b>📘 ${materia.toUpperCase()}</b><br><br>${knowledgeBase[materia].map(item => `• ${item}`).join('<br>')}`;
                }
            }
            // Ajuda por categoria
            if (c.startsWith('ajuda categoria ')) {
                const cat = c.substring(16).trim();
                if (cat === 'programacao') return "💻 Python, Java, JS, HTML, CSS, SQL, TypeScript – resumo offline.\nUse 'aprender programacao : conteudo' para adicionar.";
                if (cat === 'financas') return "💰 juros compostos, vpl, sac, price, ponto equilibrio, adicionar gasto, resumo gastos, orcamento limite, meta economia, investimento, gorjeta, dividir conta.";
                if (cat === 'utilidades') return "🎲 timer, alarme, jogar dado, cara ou coroa, sorteio, numero aleatorio, gerar senha, converter, binario, hexadecimal, validar cpf.";
                if (cat === 'produtividade') return "📝 diario, notas, listas, tarefas, lembretes, eventos, flashcards, aprender materias.";
                if (cat === 'documentos') return "📄 PDF: anexe e use botões de voz. Imagem: OCR. QR Code: botão 📷. Gerar PDF da conversa/gastos.";
                return "Categorias: programacao, financas, utilidades, produtividade, documentos.";
            }
            // Ajuda geral
            if (c === 'ajuda') {
                return `📚 **JARVIS - TODOS OS COMANDOS** 📚

📘 **MATÉRIAS** (digite o nome)
python, java, javascript, html, css, sql, typescript
matematica financeira, contabilidade
historia, geografia, fisica, quimica, biologia, ingles

💰 **FINANÇAS E CÁLCULOS**
juros compostos capital [valor] taxa [%] meses [n]

            }
            // Comandos financeiros específicos
            if (c.startsWith('juros compostos ')) {
                let parts = cmd.match(/juros compostos\s+capital\s+(\d+(?:\.\d+)?)\s+taxa\s+(\d+(?:\.\d+)?)%?\s+meses\s+(\d+)/i);
                if (parts) { let cap=parseFloat(parts[1]), taxa=parseFloat(parts[2])/100, meses=parseInt(parts[3]); let mont=cap*Math.pow(1+taxa,meses); return `📈 Montante: R$ ${mont.toFixed(2)} | Juros: R$ ${(mont-cap).toFixed(2)}`; }
                return "Formato: juros compostos capital [valor] taxa [%] meses [n]";
            }
            if (c.startsWith('vpl ')) {
                let parts = cmd.match(/vpl\s+([\d\.]+)\s+([\d\.\s]+)\s+taxa\s+(\d+(?:\.\d+)?)/i);
                if (parts) { let inv=parseFloat(parts[1]), fluxos=parts[2].trim().split(/\s+/).map(Number), taxa=parseFloat(parts[3])/100; let vpl=-inv; for(let i=0;i<fluxos.length;i++) vpl+=fluxos[i]/Math.pow(1+taxa,i+1); return `💰 VPL = R$ ${vpl.toFixed(2)}. ${vpl>=0?"Viável":"Inviável"}`; }
                return "Formato: vpl [investimento] [fc1 fc2 ...] taxa [%]";
            }
            if (c.startsWith('sac ')) {
                let parts = cmd.match(/sac\s+(\d+(?:\.\d+)?)\s+(\d+)\s+(\d+(?:\.\d+)?)/);
                if (parts) { let pv=parseFloat(parts[1]), n=parseInt(parts[2]), i=parseFloat(parts[3])/100, amort=pv/n, primeira=amort+(pv*i); return `📉 SAC: Amortização = R$ ${amort.toFixed(2)}; 1ª parcela = R$ ${primeira.toFixed(2)} (decrescente).`; }
                return "Formato: sac [valor] [meses] [taxa%]";
            }
            if (c.startsWith('price ')) {
                let parts = cmd.match(/price\s+(\d+(?:\.\d+)?)\s+(\d+)\s+(\d+(?:\.\d+)?)/);
                if (parts) { let pv=parseFloat(parts[1]), n=parseInt(parts[2]), i=parseFloat(parts[3])/100, pmt=pv*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1); return `🏦 Price: Prestação fixa = R$ ${pmt.toFixed(2)} por ${n} meses.`; }
                return "Formato: price [valor] [meses] [taxa%]";
            }
            if (c.startsWith('ponto equilibrio ')) {
                let parts = cmd.match(/ponto equilibrio\s+cf\s+(\d+(?:\.\d+)?)\s+preco\s+(\d+(?:\.\d+)?)\s+cvu\s+(\d+(?:\.\d+)?)/i);
                if (parts) { let cf=parseFloat(parts[1]), preco=parseFloat(parts[2]), cvu=parseFloat(parts[3]); let pe=cf/(preco-cvu); return `📊 Ponto de equilíbrio: ${pe.toFixed(0)} unidades (R$ ${(pe*preco).toFixed(2)} em receita).`; }
                return "Formato: ponto equilibrio cf [fixo] preco [unitario] cvu [custo variavel unitario]";
            }
            // Comandos básicos (exemplos)
            if (c === 'que horas são') return new Date().toLocaleTimeString();
            if (c === 'que dia é hoje') return new Date().toLocaleDateString();
            const jokes = ["Por que o programador foi ao mercado? Por bytes!", "O que o zero disse ao oito? Bonito cinto!", "Qual o cúmulo do preguiçoso? Ser enterrado numa montanha de documentos.", "Jarvis: 'Eu não sou burro, só tenho preguiça de processar sua pergunta estúpida.'"];
            if (c === 'conte uma piada') return jokes[Math.floor(Math.random() * jokes.length)];
            if (c === 'tudo bem?') return "Tudo ótimo, porra! Só esperando você me dar ordens.";
            if (c === 'jogar dado') return `🎲 Resultado: ${Math.floor(Math.random()*6)+1}`;
            if (c === 'cara ou coroa') return Math.random()<0.5 ? "🪙 Cara" : "🪙 Coroa";
            if (c.startsWith('gerar senha ')) { let len = Math.min(parseInt(c.split(' ')[2])||12, 30); let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%"; let pass = Array.from({length:len}, ()=>chars[Math.floor(Math.random()*chars.length)]).join(''); return `🔐 Senha gerada (${len}): ${pass}`; }
            if (c === 'modo não perturbe') { modoNaoPerturbe = !modoNaoPerturbe; return modoNaoPerturbe ? "🔇 Modo Não Perturbe ativado (sem voz)." : "🔊 Modo normal."; }
            if (c === 'vibrar') { if(navigator.vibrate) navigator.vibrate(200); return "📳 Vibrou!"; }
            if (c === 'tela cheia') { document.documentElement.requestFullscreen(); return "🖥️ Tela cheia ativada."; }
            if (c === 'limpar conversa') { chatBox.innerHTML = ''; addSystemMessage("Conversa limpa."); return "Conversa limpa."; }
            // Comandos de exemplo para tarefas, diário, etc. (para não alongar, mantenha os que já existiam no seu código)
            if (c.startsWith('adicionar gasto ')) {
                let parts = cmd.match(/adicionar gasto (.+?)\s+(\d+(?:\.\d+)?)/i);
                if(parts) { gastos.push({ cat: parts[1], val: parseFloat(parts[2]), date: new Date() }); saveAll(); return `💰 Gasto registrado: ${parts[1]} R$ ${parseFloat(parts[2]).toFixed(2)}`; }
                return "Formato: adicionar gasto [categoria] [valor]";
            }
            if (c === 'resumo gastos') {
                let total = gastos.reduce((s,g)=>s+g.val,0);
                let cats = {}; gastos.forEach(g=>cats[g.cat]=(cats[g.cat]||0)+g.val);
                return `💰 Total: R$ ${total.toFixed(2)}\nPor categoria:\n`+Object.entries(cats).map(([k,v])=>`  ${k}: R$ ${v.toFixed(2)}`).join("\n");
            }
            if (c.startsWith('registrar diario ')) { let txt = cmd.substring(16).trim(); if(txt){ knowledgeBase.diario.push(`${new Date().toLocaleDateString()}: ${txt}`); saveKnowledgeBase(); return "📓 Registrado no diário."; } return "Escreva algo."; }
            if (c === 'ler diario') return knowledgeBase.diario.length ? "📖 Diário:\n" + knowledgeBase.diario.join("\n") : "Diário vazio.";
            if (c.startsWith('aprender ')) {
                let resto = cmd.substring(8).trim();
                let sep = resto.indexOf(':');
                if (sep > 0) { let materia = resto.substring(0, sep).trim().toLowerCase(); let conteudo = resto.substring(sep+1).trim(); if (!knowledgeBase[materia]) knowledgeBase[materia] = []; knowledgeBase[materia].push(conteudo); saveKnowledgeBase(); return `✅ Aprendi "${materia}": "${conteudo.substring(0,50)}..."`; }
                return "Use: aprender [matéria] : [conteúdo]";
            }
            return null;
        }

        // ==================== PROCESSAMENTO PRINCIPAL ====================
        async function processUserInput(text) {
            addMessage('user', text);
            typingDiv.innerText = 'JARVIS pensando...';
            let resposta = processOfflineCommand(text);
            if (!resposta) resposta = "Comando não reconhecido. Digite 'ajuda' para ver todos os comandos disponíveis.";
            typingDiv.innerText = '';
            addMessage('jarvis', resposta, true);
            speak(resposta);
        }

        // ==================== VOZ ====================
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition(); recognition.lang = 'pt-BR'; recognition.continuous = false; recognition.interimResults = false;
            recognition.onresult = (event) => { const fala = event.results[0][0].transcript; userInput.value = fala; processUserInput(fala); };
            voiceBtn.onclick = () => recognition.start();
        } else voiceBtn.style.display = 'none';

        // ==================== BACKUP / RESTORE ====================
        function exportBackup() { const data = { knowledgeBase, gastos, eventos, senhas, carteiraInvestimentos, orcamentoMensal, metaEconomia, speechEnabled, speechRate }; const blob = new Blob([JSON.stringify(data)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'jarvis_backup.json'; a.click(); }
        function importBackup() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json'; input.onchange = async (e) => { const file = e.target.files[0]; const text = await file.text(); try { const data = JSON.parse(text); Object.assign(knowledgeBase, data.knowledgeBase); gastos = data.gastos; eventos = data.eventos; senhas = data.senhas; carteiraInvestimentos = data.carteiraInvestimentos || []; orcamentoMensal = data.orcamentoMensal || { limite:0 }; metaEconomia = data.metaEconomia || { objetivo:0, atual:0 }; speechEnabled = data.speechEnabled; speechRate = data.speechRate || 0.9; saveAll(); localStorage.setItem('jarvis_speech', speechEnabled); updateSpeechUI(); addSystemMessage("✅ Backup restaurado."); } catch(err) { addSystemMessage("❌ Arquivo inválido."); } }; input.click(); }
        function clearAllData() { if (confirm("⚠️ Apagar TODOS os dados? Isso não pode ser desfeito.")) { localStorage.clear(); location.reload(); } }
        document.getElementById('exportBackupBtn').onclick = exportBackup;
        document.getElementById('importBackupBtn').onclick = importBackup;
        document.getElementById('clearDataBtn').onclick = clearAllData;

        // ==================== MENU E TEMAS ====================
        function toggleSidebar(show) { if (show) { sidebar.classList.add('open'); overlay.classList.add('active'); } else { sidebar.classList.remove('open'); overlay.classList.remove('active'); } }
        menuBtn.onclick = () => toggleSidebar(true); closeSidebar.onclick = () => toggleSidebar(false); overlay.onclick = () => toggleSidebar(false);
        document.querySelectorAll('.theme-btn').forEach(btn => { btn.onclick = () => { const theme = btn.getAttribute('data-theme'); document.body.className = theme === 'dark' ? '' : theme; if (theme === 'dark') document.body.removeAttribute('class'); localStorage.setItem('jarvis_theme', theme); }; });
        const savedTheme = localStorage.getItem('jarvis_theme'); if (savedTheme && savedTheme !== 'dark') document.body.className = savedTheme;

        // ==================== BOTÕES RÁPIDOS ====================
        const quickCmds = ["python", "java", "javascript", "html", "css", "sql", "typescript", "ajuda"];
        const quickContainer = document.getElementById('quickButtons');
        quickCmds.forEach(cmd => { const btn = document.createElement('button'); btn.textContent = cmd; btn.className = 'quick-btn'; btn.onclick = () => processUserInput(cmd); quickContainer.appendChild(btn); });
        const attachQuick = document.createElement('button'); attachQuick.textContent = "📎 Anexar PDF/Imagem"; attachQuick.className = 'quick-btn'; attachQuick.onclick = uploadFile; quickContainer.appendChild(attachQuick);

        sendBtn.onclick = () => { if (userInput.value.trim()) processUserInput(userInput.value.trim()); userInput.value = ''; };
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

        addSystemMessage("✨ JARVIS com programação, finanças e humanidades carregado. Digite 'ajuda' para ver todos os comandos.");
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(err => console.error); }
    </script>
